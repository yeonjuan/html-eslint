<!doctype html>
<extends src="components/layout.html">
  <block name="meta">
    <title>html-eslint</title>
    <link href="https://html-eslint.org/" rel="canonical">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "@id": "https://html-eslint.org/#software",
          "name": "html-eslint",
          "url": "https://html-eslint.org/",
          "applicationCategory": "DeveloperApplication",
          "operatingSystem": "Cross-platform",
          "description": "An ESLint plugin for linting and fixing HTML, React (JSX), Svelte, and Angular templates.",
          "keywords": "ESLint, HTML Lint, React, Svelte, Angular, Static Analysis, Code Quality",
          "softwareVersion": "LATEST",
          "license": "https://opensource.org/licenses/MIT",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "publisher": {
            "@type": "Person",
            "name": "yeonjuan",
            "url": "https://github.com/yeonjuan"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://html-eslint.org/",
          "name": "html-eslint",
          "url": "https://html-eslint.org/",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://html-eslint.org/docs/rules/{search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "ItemList",
          "name": "Main Sections",
          "itemListElement": [
            {
              "@type": "SiteNavigationElement",
              "position": 1,
              "name": "HTML Plugin",
              "description": "ESLint plugin for linting HTML files",
              "url": "https://html-eslint.org/docs/getting-started.html"
            },
            {
              "@type": "SiteNavigationElement",
              "position": 2,
              "name": "React Plugin",
              "description": "ESLint plugin for linting HTML in React/JSX",
              "url": "https://html-eslint.org/docs/react/getting-started"
            },
            {
              "@type": "SiteNavigationElement",
              "position": 3,
              "name": "Svelte Plugin",
              "description": "ESLint plugin for linting HTML in Svelte",
              "url": "https://html-eslint.org/docs/svelte/getting-started"
            },
            {
              "@type": "SiteNavigationElement",
              "position": 4,
              "name": "Angular Template Plugin",
              "description": "ESLint plugin for linting Angular templates",
              "url": "https://html-eslint.org/docs/angular-template/getting-started"
            },
            {
              "@type": "SiteNavigationElement",
              "position": 5,
              "name": "Playground",
              "description": "Try HTML-ESLint in your browser",
              "url": "https://html-eslint.org/playground/"
            }
          ]
        }
      ]
    }
    </script>
    <meta content="HTML-ESLint - ESLint Plugin for HTML Linting" property="og:title">
    <meta content="An ESLint plugin for linting and fixing HTML, React (JSX), Svelte, and Angular templates. Find and fix problems in your HTML code." property="og:description">
    <meta content="An ESLint plugin for linting and fixing HTML, React (JSX), Svelte, and Angular templates. Find and fix problems in your HTML code." name="description">
  </block>
  <block name="nav"></block>
  <block name="content">
    <include src="components/home.html"></include>
  </block>
  <block name="footer">
    <module href="/components/footer.html" locals='{"class":""}'></module>
  </block>
</extends>
